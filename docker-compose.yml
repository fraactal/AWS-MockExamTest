services:
  aws-prep-app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-aws-prep-app}
    ports:
      - "${APP_PORT:-3080}:3080"
    environment:
      PORT: 3080
      DATABASE_PATH: /data/prep.db
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./runtime-data:/data
    restart: unless-stopped
